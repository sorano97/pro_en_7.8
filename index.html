<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>神山町 危険箇所マップ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  >
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f4f3f1;
      color: #161616;
    }

    #header {
      background: #ffffff;
      color: #161616;
      padding: 12px 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 2px solid #161616;
    }

    #header-text {
      min-width: 0;
    }

    #header h1 {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #161616;
    }

    #header p {
      font-size: 0.74rem;
      color: #6b6b66;
      letter-spacing: 0.01em;
      margin-top: 3px;
    }

    #reading-toggle {
      border: 1.6px solid #161616;
      background: #ffffff;
      color: #161616;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }

    #reading-toggle:hover {
      background: #161616;
      color: #ffffff;
    }

    #reading-toggle.active {
      background: #161616;
      color: #ffffff;
    }

    #main {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    #side-panel {
      width: 360px;
      background: #ffffff;
      border-right: 2px solid #161616;
      overflow-y: auto;
      padding: 16px;
      min-height: 0;
      flex-shrink: 0;
    }

    #map-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #filter-bar {
      background: #ffffff;
      border-bottom: 2px solid #161616;
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    #filter-bar span {
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #161616;
    }

    .filter-btn {
      border: 1.6px solid #161616;
      background: #ffffff;
      color: #161616;
      border-radius: 999px;
      padding: 5px 13px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }

    .filter-btn:hover {
      background: #f1f0ec;
    }

    .filter-btn.active {
      background: #161616;
      color: #ffffff;
    }

    .filter-btn.active:hover {
      background: #2a2a2a;
    }

    #search-area {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 4px;
    }

    #search-input {
      width: 220px;
      border: 1.6px solid #d8d6d1;
      border-radius: 999px;
      padding: 6px 13px;
      font-size: 0.8rem;
      background: #fff;
      color: #161616;
      font-family: inherit;
    }

    #search-input:focus {
      outline: none;
      border-color: #161616;
      box-shadow: 0 0 0 3px rgba(22,22,22,0.08);
    }

    #clear-search-btn {
      border: 1.6px solid #d8d6d1;
      background: white;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b6b66;
      white-space: nowrap;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }

    #clear-search-btn:hover {
      border-color: #161616;
      color: #161616;
    }

    #count-display {
      margin-left: auto;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #6b6b66;
      white-space: nowrap;
    }

    #map {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .form-card {
      background: #ffffff;
      border: 1.8px solid #161616;
      border-radius: 16px;
      padding: 16px;
    }

    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #161616;
      margin-bottom: 5px;
    }

    .form-card .lead {
      font-size: 0.78rem;
      color: #6b6b66;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #161616;
      margin-bottom: 5px;
    }

    .required {
      color: #c5221f;
      font-size: 0.72rem;
      font-weight: 700;
      margin-left: 4px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1.6px solid #d8d6d1;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.9rem;
      background: #fff;
      color: #161616;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #161616;
      box-shadow: 0 0 0 3px rgba(22,22,22,0.08);
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row .form-group {
      flex: 1;
    }

    .location-btn {
      width: 100%;
      border: 1.6px solid transparent;
      border-radius: 10px;
      padding: 10px;
      background: #efeee8;
      color: #161616;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .location-btn:hover {
      background: #e3e1d8;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px;
      background: #161616;
      color: white;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
      margin-top: 4px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .submit-btn:hover {
      background: #2c2c2c;
    }

    .submit-btn:disabled {
      background: #b9b7b0;
      cursor: not-allowed;
    }

    .reset-btn {
      width: 100%;
      border: 1.6px solid #161616;
      border-radius: 12px;
      padding: 10px;
      background: #ffffff;
      color: #161616;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .reset-btn:hover {
      background: #f1f0ec;
    }

    #message {
      margin-top: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
      padding: 9px 11px;
      border-radius: 10px;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #message.success {
      display: block;
      background: #eef4ed;
      color: #137333;
      border: 1.4px solid #137333;
    }

    #message.error {
      display: block;
      background: #fbecea;
      color: #c5221f;
      border: 1.4px solid #c5221f;
    }

    .hint {
      font-size: 0.72rem;
      color: #8a8a84;
      margin-top: 4px;
      line-height: 1.4;
    }

    .leaflet-popup-content-wrapper {
      border: 1.8px solid #161616;
      border-radius: 12px;
      box-shadow: none;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
    }

    .leaflet-popup-tip-container {
      filter: none;
    }

    .leaflet-bar a {
      border-radius: 0;
      color: #161616;
    }

    .custom-cluster-icon {
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.28));
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(244,243,241,0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.35s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-box {
      text-align: center;
      padding: 28px 36px;
      background: #ffffff;
      border: 1.8px solid #161616;
      border-radius: 16px;
      min-width: 240px;
    }

    .loading-spinner {
      width: 38px;
      height: 38px;
      border: 3.5px solid #e4e2dc;
      border-top-color: #161616;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #161616;
      margin-bottom: 14px;
    }

    .loading-bar-track {
      width: 220px;
      height: 5px;
      background: #e4e2dc;
      border-radius: 3px;
      overflow: hidden;
      margin: 0 auto;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #161616;
      border-radius: 3px;
      transition: width 0.2s ease;
    }

    .loading-count {
      margin-top: 10px;
      font-size: 0.76rem;
      font-weight: 600;
      color: #6b6b66;
    }

    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-color: transparent;
    }

    @media (max-width: 900px) {
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        height: 100vh;
      }

      #header {
        align-items: flex-start;
      }

      #header h1 {
        font-size: 1rem;
      }

      #reading-toggle {
        font-size: 0.75rem;
        padding: 6px 9px;
      }

      #main {
        flex-direction: column;
        overflow: hidden;
      }

      #side-panel {
        width: 100%;
        height: 42vh;
        border-right: none;
        border-bottom: 2px solid #161616;
        overflow-y: auto;
        flex-shrink: 0;
      }

      #map-area {
        flex: 1;
        height: auto;
        min-height: 0;
      }

      #filter-bar {
        padding: 8px;
        gap: 6px;
        max-height: 120px;
        overflow-y: auto;
      }

      #search-area {
        width: 100%;
        margin-left: 0;
      }

      #search-input {
        flex: 1;
        width: auto;
      }

      #count-display {
        width: 100%;
        margin-left: 0;
      }

      .filter-btn {
        font-size: 0.75rem;
        padding: 4px 10px;
      }
    }
  </style>
</head>

<body>
  <div id="header">
    <div id="header-text">
      <h1 data-normal="&#x1F5FA; 神山町 危険箇所マップ" data-hira="&#x1F5FA; かみやまちょう きけんなところマップ">
        &#x1F5FA; 神山町 危険箇所マップ
      </h1>
      <p data-normal="地域の危険箇所をみんなでオープンデータ化するプロジェクト" data-hira="ちいきの きけんなところを みんなで あつめる プロジェクト">
        地域の危険箇所をみんなでオープンデータ化するプロジェクト
      </p>
    </div>

    <button type="button" id="reading-toggle" data-normal="ひらがなにする" data-hira="かんじにする">
      ひらがなにする
    </button>
  </div>

  <div id="main">
    <div id="side-panel">
      <div class="form-card">
        <h2 data-normal="危険な場所を登録する" data-hira="きけんな ばしょを とうろくする">危険な場所を登録する</h2>
        <p
          class="lead"
          data-normal="危険だと感じた場所を入力すると、スプレッドシートに保存され、地図上にも表示されます"
          data-hira="きけんだと おもった ばしょを 入れると、ちずに 表示されます"
        >
          危険だと感じた場所を入力すると、スプレッドシートに保存され、地図上にも表示されます
        </p>

        <!-- フォームは見た目そのまま。送信ボタンを押してもサーバーには飛ばさない（地図は GeoJSON から読む） -->
        <form id="danger-form">
          <div class="form-group">
            <label for="placeName">
              <span data-normal="場所名" data-hira="ばしょの なまえ">場所名</span>
              <span class="required" data-normal="必須" data-hira="かならず">必須</span>
            </label>
            <input
              type="text"
              id="placeName"
              placeholder="例：〇〇交差点、〇〇公園前"
              data-normal-placeholder="例：〇〇交差点、〇〇公園前"
              data-hira-placeholder="れい：〇〇こうさてん、〇〇こうえんまえ"
              required
            >
          </div>

          <button
            type="button"
            class="location-btn"
            id="get-location-btn"
            data-normal="&#x1F4CD; 現在地を取得する"
            data-hira="&#x1F4CD; いまいる ばしょを 入れる"
          >
            &#x1F4CD; 現在地を取得する
          </button>

          <div class="row">
            <div class="form-group">
              <label for="lat">
                <span data-normal="緯度" data-hira="いど">緯度</span>
                <span class="required" data-normal="必須" data-hira="かならず">必須</span>
              </label>
              <input type="number" step="any" id="lat" placeholder="33.9227" required>
            </div>

            <div class="form-group">
              <label for="lng">
                <span data-normal="経度" data-hira="けいど">経度</span>
                <span class="required" data-normal="必須" data-hira="かならず">必須</span>
              </label>
              <input type="number" step="any" id="lng" placeholder="134.3980" required>
            </div>
          </div>

          <div class="form-group">
            <label for="dangerType">
              <span data-normal="危険の種類" data-hira="きけんの しゅるい">危険の種類</span>
              <span class="required" data-normal="必須" data-hira="かならず">必須</span>
            </label>
            <select id="dangerType" required>
              <option value="" data-normal="選択してください" data-hira="えらんでください">選択してください</option>
              <option value="交通量が多い" data-normal="交通量が多い" data-hira="くるまが おおい">交通量が多い</option>
              <option value="暗い道" data-normal="暗い道" data-hira="くらいみち">暗い道</option>
              <option value="不審者" data-normal="不審者" data-hira="あやしい人">不審者</option>
              <option value="見通しが悪い" data-normal="見通しが悪い" data-hira="まわりが 見えにくい">見通しが悪い</option>
              <option value="事故" data-normal="事故" data-hira="じこ">事故</option>
              <option value="自然災害" data-normal="自然災害" data-hira="しぜんさいがい">自然災害</option>
              <option value="その他" data-normal="その他" data-hira="そのほか">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="dangerLevel">
              <span data-normal="危険度" data-hira="きけんレベル">危険度</span>
              <span class="required" data-normal="必須" data-hira="かならず">必須</span>
            </label>
            <select id="dangerLevel" required>
              <option value="" data-normal="選択してください" data-hira="えらんでください">選択してください</option>
              <option value="1" data-normal="1：低い" data-hira="1：ひくい">1：低い</option>
              <option value="2" data-normal="2：やや低い" data-hira="2：すこし ひくい">2：やや低い</option>
              <option value="3" data-normal="3：普通" data-hira="3：ふつう">3：普通</option>
              <option value="4" data-normal="4：高い" data-hira="4：たかい">4：高い</option>
              <option value="5" data-normal="5：とても高い" data-hira="5：とても たかい">5：とても高い</option>
            </select>
          </div>

          <div class="form-group">
            <label for="description">
              <span data-normal="説明文" data-hira="せつめい">説明文</span>
              <span class="required" data-normal="必須" data-hira="かならず">必須</span>
            </label>
            <textarea
              id="description"
              placeholder="例：街灯が少なく、夜はかなり暗いです"
              data-normal-placeholder="例：街灯が少なく、夜はかなり暗いです"
              data-hira-placeholder="れい：あかりが 少なく、よるは かなり くらいです"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label for="posterType" data-normal="投稿者区分" data-hira="とうろくした人">投稿者区分</label>
            <select id="posterType">
              <option value="学生" data-normal="学生" data-hira="がくせい">学生</option>
              <option value="保護者" data-normal="保護者" data-hira="ほごしゃ">保護者</option>
              <option value="教員" data-normal="教員" data-hira="先生">教員</option>
              <option value="地域住民" data-normal="地域住民" data-hira="ちいきの人">地域住民</option>
              <option value="その他" data-normal="その他" data-hira="そのほか">その他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="shelter" data-normal="近くの避難場所" data-hira="近くの にげる場所">近くの避難場所</label>
            <input
              type="text"
              id="shelter"
              placeholder="例：〇〇公民館、学校、コンビニ"
              data-normal-placeholder="例：〇〇公民館、学校、コンビニ"
              data-hira-placeholder="れい：〇〇こうみんかん、学校、コンビニ"
            >
          </div>

          <div class="form-group">
            <label for="police" data-normal="近くの交番・警察署" data-hira="近くの こうばん・けいさつ">近くの交番・警察署</label>
            <input
              type="text"
              id="police"
              placeholder="例：〇〇駐在所、〇〇警察署"
              data-normal-placeholder="例：〇〇駐在所、〇〇警察署"
              data-hira-placeholder="れい：〇〇ちゅうざいしょ、〇〇けいさつしょ"
            >
          </div>

          <div class="form-group">
            <label for="contact" data-normal="相談・通報先" data-hira="そうだん・れんらく先">相談・通報先</label>
            <input
              type="text"
              id="contact"
              placeholder="例：警察相談専用電話 #9110"
              data-normal-placeholder="例：警察相談専用電話 #9110"
              data-hira-placeholder="れい：けいさつそうだん #9110"
            >
            <p
              class="hint"
              data-normal="緊急時は110番など、実際の状況に応じた連絡先を使ってください"
              data-hira="きんきゅうのときは 110ばんなどに れんらくしてください"
            >
              緊急時は110番など、実際の状況に応じた連絡先を使ってください
            </p>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn" data-normal="登録する" data-hira="とうろくする">
            登録する
          </button>

          <button type="reset" class="reset-btn" data-normal="入力をリセット" data-hira="入力をけす">
            入力をリセット
          </button>

          <div id="message"></div>
        </form>
      </div>
    </div>

    <div id="map-area">
      <div id="filter-bar">
        <span data-normal="フィルター：" data-hira="しぼりこみ：">フィルター：</span>
        <button class="filter-btn active" data-type="すべて" data-normal="すべて" data-hira="すべて">すべて</button>
        <button class="filter-btn" data-type="交通量が多い" data-normal="&#x1F697; 交通" data-hira="&#x1F697; くるま">&#x1F697; 交通</button>
